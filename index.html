<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Transactions Summarizer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="head">
        <h1>Summary Generator</h1>
      </header>
      <section class="card">
        <label class="label">Upload Excel (.xlsx)</label
        ><input id="file" type="file" accept=".xlsx,.xlsm,.xlsb,.xls" />

        <div id="status" class="status" aria-live="polite"></div>
      </section>
      <div class="flex">
        <label class="label" for="focalType">Focal entity type</label>
        <select id="focalType">
          <option value="individual" selected>Individual</option>
          <option value="entity">Entity</option>
        </select>
      </div>
      <section class="card" id="focal-individual-form">
        <div class="row">
          <div>
            <label class="label">Focal Entity Detail (Individual)</label>
          </div>
        </div>
        <div class="flex">
          <div>
            <label class="label" for="ind_focalName">Focal entity</label>
            <input id="ind_focalName" type="text" placeholder="Focal entity" />
          </div>
          <div>
            <label class="label" for="ind_dob">Date of birth</label>
            <input id="ind_dob" type="date" placeholder="Date of birth" />
          </div>
          <div>
            <label class="label" for="ind_city">City</label>
            <input id="ind_city" type="text" placeholder="City" />
          </div>
          <div>
            <label class="label" for="ind_state">State</label>
            <input id="ind_state" type="text" placeholder="State" />
          </div>
          <div>
            <label class="label" for="ind_occupation">Occupation</label>
            <input id="ind_occupation" type="text" placeholder="Occupation" />
          </div>
          <div>
            <label class="label" for="ind_employer">Employer name</label>
            <input id="ind_employer" type="text" placeholder="Employer name" />
          </div>
          <div>
            <label class="label" for="ind_relationshipStart"
              >Relationship start date</label
            >
            <input
              id="ind_relationshipStart"
              type="date"
              placeholder="Relationship start date"
            />
          </div>
          <div>
            <label class="label" for="ind_addlInfo"
              >Additional info (details + source)</label
            >
            <input
              id="ind_addlInfo"
              type="text"
              placeholder="Additional info (details + source)"
            />
          </div>
          <div>
            <label class="label" for="ind_customerStatus"
              >Customer status</label
            >
            <select id="ind_customerStatus">
              <option value="active" selected>Still a TD customer</option>
              <option value="inactive">No longer a TD customer</option>
            </select>
          </div>
          <div class="row">
            <div id="ind_inactive_fields">
              <div>
                <label class="label" for="ind_endDate"
                  >No longer customer as of (date)</label
                >
                <input
                  id="ind_endDate"
                  type="date"
                  placeholder="No longer customer as of (date)"
                />
              </div>

              <div>
                <label class="label" for="ind_reason"
                  >Reason for no longer being a customer</label
                >
                <input
                  id="ind_reason"
                  type="text"
                  placeholder="Reason for no longer being a customer"
                />
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="card hidden" id="focal-entity-form">
        <div class="row">
          <div><label class="label">Focal Entity Detail (Entity)</label></div>
        </div>
        <div class="flex">
          <div>
            <label class="label" for="ent_focalName">Focal entity</label>
            <input id="ent_focalName" type="text" placeholder="Focal entity" />
          </div>
          <div>
            <label class="label" for="ent_incorpDate"
              >Date of incorporation</label
            >
            <input
              id="ent_incorpDate"
              type="date"
              placeholder="Date of incorporation"
            />
          </div>
          <div>
            <label class="label" for="ent_city">City</label>
            <input id="ent_city" type="text" placeholder="City" />
          </div>
          <div>
            <label class="label" for="ent_state">State</label>
            <input id="ent_state" type="text" placeholder="State" />
          </div>
          <div>
            <label class="label" for="ent_relationshipStart"
              >Relationship start date</label
            >
            <input
              id="ent_relationshipStart"
              type="date"
              placeholder="Relationship start date"
            />
          </div>
          <div>
            <label class="label" for="ent_natureBusiness"
              >Nature of business</label
            >
            <input
              id="ent_natureBusiness"
              type="text"
              placeholder="Nature of business"
            />
          </div>
          <div>
            <label class="label" for="ent_naics">NAICS code</label>
            <input id="ent_naics" type="text" placeholder="NAICS code" />
          </div>
          <div>
            <label class="label" for="ent_addlInfo"
              >Additional info (details + source)</label
            >
            <input
              id="ent_addlInfo"
              type="text"
              placeholder="Additional info (details + source)"
            />
          </div>
          <div>
            <label class="label" for="ent_relatedParty">Related party</label>
            <input
              id="ent_relatedParty"
              type="text"
              placeholder="Related party"
            />
          </div>
          <div>
            <label class="label" for="ent_reason"
              >Reason for no longer being a customer</label
            >
            <input
              id="ent_reason"
              type="text"
              placeholder="Reason for no longer being a customer"
            />
          </div>
        </div>
      </section>
      <section class="card">
        <div class="row">
          <div>
            <label class="label">RFI Summary</label>
            <div class="flex">
              <label class="label" for="rfi_status" style="margin-top: 8px"
                >RFI status</label
              >
              <select id="rfi_status">
                <option value="no_prior_rfi_flag" selected>
                  no Prior RFI Flag
                </option>
                <option value="prior_rfi_flag_present">
                  If Prior RFI Flag is present
                </option>
                <option value="lookback_submitted_no_response">
                  If Lookback RFI submitted, but no response received
                </option>
                <option value="lookback_submitted_response_received">
                  If Lookback RFI submitted, and Response Received
                </option>
              </select>
            </div>
          </div>
        </div>
        <div
          id="rfi_fields_prior"
          class="rfi-fields hidden"
          style="margin-top: 10px"
        >
          <div class="flex">
            <div>
              <label class="label" for="rfi_count">RFI count</label>
              <input
                id="rfi_count"
                type="number"
                min="0"
                step="1"
                placeholder="e.g., 2"
              />
            </div>
            <div>
              <label class="label" for="rfi_submitted_date"
                >RFI submitted date</label
              >
              <input id="rfi_submitted_date" type="date" />
            </div>
            <div>
              <label class="label" for="rfi_questions_summary"
                >Summary of questions</label
              >
              <textarea
                id="rfi_questions_summary"
                rows="3"
                placeholder="Summary of questions"
              ></textarea>
            </div>
            <div>
              <label class="label" for="rfi_response_detail"
                >RFI response detail</label
              >
              <textarea
                id="rfi_response_detail"
                rows="3"
                placeholder="Enter response details"
              ></textarea>
            </div>
          </div>
        </div>
        <div
          id="rfi_fields_lookback_noresp"
          class="rfi-fields hidden"
          style="margin-top: 10px"
        >
          <div class="flex">
            <div>
              <label class="label" for="rfi_lookback_submitted_date"
                >Date submitted</label
              >
              <input id="rfi_lookback_submitted_date" type="date" />
            </div>
            <div>
              <label class="label" for="rfi_lookback_purpose"
                >Purpose for RFI</label
              >
              <textarea
                id="rfi_lookback_purpose"
                rows="3"
                placeholder="Purpose for RFI"
              ></textarea>
            </div>
            <div>
              <label class="label" for="rfi_todays_date">Today's date</label>
              <input id="rfi_todays_date" type="date" />
            </div>
          </div>
        </div>

        <div
          id="rfi_fields_lookback_resp"
          class="rfi-fields hidden"
          style="margin-top: 10px"
        >
          <div class="flex">
            <div>
              <label class="label" for="rfi_response_summary"
                >Summary of RFI response</label
              >
              <textarea
                id="rfi_response_summary"
                rows="3"
                placeholder="Summarize the response"
              ></textarea>
            </div>
          </div>
        </div>
      </section>

      <section class="card" id="counterparty-card">
        <div class="row">
          <div>
            <label class="label">Counterparties</label>

            <div class="flex" style="gap: 10px; align-items: flex-end">
              <div style="flex: 1">
                <label
                  class="label"
                  for="counterparty_count"
                  style="margin-top: 8px"
                  >Number of counterparties</label
                >
                <input
                  id="counterparty_count"
                  type="number"
                  min="0"
                  step="1"
                  placeholder="e.g., 3"
                />
              </div>

              <button
                id="counterparty_add_btn"
                type="button"
                style="height: 38px"
              >
                Add
              </button>
            </div>
            <div class="flex">
              <div id="counterparty_fields" style="margin-top: 10px"></div>
            </div>
          </div>
        </div>
      </section>
      <section class="card">
        <div class="row">
          <div>
            <label class="label" id="summary">Summary </label>
          </div>
          <div class="rowBtns">
            <button id="btnGenerate" class="btn primary" disabled>
              Generate
            </button>
            <button id="btnCopy" class="btn" disabled>Copy</button>
            <button id="btnClear" class="btn" disabled>Clear</button>
          </div>
        </div>

        <div class="rte">
          <div class="rteToolbar" role="toolbar" aria-label="Summary toolbar">
            <button
              class="iconBtn"
              type="button"
              data-target="summaryEditor"
              data-cmd="bold"
            >
              <b>B</b>
            </button>
            <button
              class="iconBtn"
              type="button"
              data-target="summaryEditor"
              data-cmd="italic"
            >
              <i>I</i>
            </button>
            <button
              class="iconBtn"
              type="button"
              data-target="summaryEditor"
              data-cmd="underline"
            >
              <u>U</u>
            </button>
            <span class="sep"></span>
            <button
              class="iconBtn"
              type="button"
              data-target="summaryEditor"
              data-cmd="insertUnorderedList"
            >
              • List
            </button>
            <button
              class="iconBtn"
              type="button"
              data-target="summaryEditor"
              data-cmd="insertOrderedList"
            >
              1. List
            </button>
            <span class="sep"></span>
            <button
              class="iconBtn danger"
              type="button"
              data-target="summaryEditor"
              data-action="clearFormat"
            >
              Clear format
            </button>
          </div>

          <div
            id="summaryEditor"
            class="rteEditor placeholder"
            contenteditable="true"
            spellcheck="true"
            data-placeholder="Summary will appear here..."
          ></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
