<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Transactions Summarizer</title>
  <style>
    :root {
      --bg: #0f1216;
      --card: #151a21;
      --text: #e9eef6;
      --muted: #aab4c2;
      --line: #263042;
      --primary: #86bc25;
      --blue: #007cb0;
      --danger: #da291c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family:
        system-ui,
        -apple-system,
        Segoe UI,
        Roboto,
        Arial,
        sans-serif;
      background: linear-gradient(180deg, #0b0e12, var(--bg));
      color: var(--text);
    }

    .app {
      max-width: 100%;
      margin: 28px auto;
      padding: 0 16px;
    }

    .head {
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin: 12px 0;
    }

    .label {
      display: block;
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 6px;
    }

    #summary {
      color: (var(--text));
      font-size: 18px;
      font-weight: 600;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .status.ok {
      color: #cfe8b3;
    }

    .status.bad {
      color: #ffb3ad;
    }

    .row {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .rowBtns {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    input {
      background-color: #10151c;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--line);
      color: var(--text);
      margin-bottom: 10px;
    }

    input:focus {
      background-color: #10151c;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--line);
      color: var(--text);
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background:
        radial-gradient(120% 140% at 20% 0%,
          rgba(255, 255, 255, 0.1),
          transparent 55%),
        linear-gradient(180deg,
          rgba(255, 255, 255, 0.06),
          rgba(255, 255, 255, 0.02));
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 750;
      font-size: 13px;
      letter-spacing: 0.2px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      transition:
        transform 0.12s ease,
        box-shadow 0.18s ease,
        border-color 0.18s ease;
    }

    .btn:hover:not(:disabled) {
      border-color: rgba(255, 255, 255, 0.22);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.34);
      transform: translateY(-1px);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0px);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn.primary {
      border-color: rgba(134, 188, 37, 0.55);
      background:
        radial-gradient(120% 140% at 20% 0%,
          rgba(255, 255, 255, 0.12),
          transparent 55%),
        linear-gradient(180deg, rgba(134, 188, 37, 0.26), rgba(134, 188, 37, 0.12));
    }

    .btn.primary:hover:not(:disabled) {
      border-color: rgba(134, 188, 37, 0.85);
      box-shadow:
        0 14px 34px rgba(0, 0, 0, 0.34),
        0 0 0 6px rgba(134, 188, 37, 0.14);
    }

    /* Nice file button */
    input[type="file"]::file-selector-button {
      appearance: none;
      border: 1px solid rgba(0, 124, 176, 0.65);
      background:
        radial-gradient(120% 140% at 20% 0%,
          rgba(255, 255, 255, 0.12),
          transparent 55%),
        linear-gradient(180deg, rgba(0, 124, 176, 0.28), rgba(0, 124, 176, 0.12));
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 750;
      margin: 10px;
      transition:
        transform 0.12s ease,
        box-shadow 0.18s ease,
        border-color 0.18s ease;
    }

    input[type="file"]::file-selector-button:hover {
      border-color: rgba(0, 124, 176, 0.95);
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.3),
        0 0 0 6px rgba(0, 124, 176, 0.14);
      transform: translateY(-1px);
    }

    /* Rich text editor */
    .rte {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #0f141b;
      margin-top: 10px;
    }

    .rteToolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #10151c;
    }

    .iconBtn {
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #0f141b;
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
      font-size: 13px;
    }

    .iconBtn:hover {
      border-color: rgba(255, 255, 255, 0.22);
    }

    .iconBtn:active {
      transform: translateY(1px);
    }

    .iconBtn.danger {
      border-color: rgba(218, 41, 28, 0.55);
      background: rgba(218, 41, 28, 0.1);
    }

    .sep {
      width: 1px;
      height: 26px;
      background: var(--line);
      margin: 0 2px;
    }

    #analysisEditor {
      min-height: 100px;
    }

    .rteEditor {
      min-height: 200px;
      padding: 12px;
      outline: none;
      color: var(--text);
    }

    .rteEditor.placeholder:empty:before {
      content: attr(data-placeholder);
      color: var(--muted);
    }

    .flex {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .flex .label {
      font-size: 14px;
      color: var(--text);
    }

    .flex select {
      background-color: var(--bg);
      border-radius: 8px;
      color: var(--muted);
      padding: 8px;
      width: 150px;
    }

    .hidden {
      display: none;
    }

    ::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 1;
    }

    #rfi_status {
      width: 350px;
    }

    textarea {
      background-color: var(--bg);
      border-radius: 8px;
      color: var(--muted);
      padding: 8px;
      min-width: 300px;
    }

    #counterparty_fields {
      gap: 12px;
      width: 100%;
      align-items: start;
      margin-top: 10px;
    }

    .cpcard {
      display: flex;
      gap: 20px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 14px;
      align-items: center;
      padding: 16px;
      margin: 12px 0;
    }

    .cp-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }

    .cp-card label {
      display: block;
      margin-top: 10px;
    }

    .cp-card input {
      width: 100%;
    }

    #counterparty_add_btn {
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #0e2330;
      color: var(--text);
      padding: 8px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
      font-size: 12px;
      margin-top: 24px;
    }

    #feedbackLink {
      color: var(--muted);
      text-align: right;
      width: 100%;
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="head">
      <h1>Summary Generator</h1>
    </header>
    <section class="card" style="width: fit-content; display: flex">
      <div>

      </div>

        </div>
        <div>

        </div>
        <div>
          <label class="label" for="ind_city">City</label>
          <input id="ind_city" type="text" placeholder="City" />
        </div>
        <div>
          <label class="label" for="ind_state">State</label>
          <input id="ind_state" type="text" placeholder="State" />
        </div>
        <div>
          <label class="label" for="ind_occupation">Occupation</label>
          <input id="ind_occupation" type="text" placeholder="Occupation" />
        </div>
        <div>
          <label class="label" for="ind_employer">Employer name</label>

        </div>
        <div>

    </section>
    <section class="card hidden" id="focal-entity-form">
      <div class="row">
        <div><label class="label">Focal Entity Detail (Entity)</label></div>
      </div>
      <div class="flex">
        <div>
          <label class="label" for="ent_focalName">Focal entity</label>
          <input id="ent_focalName" type="text" placeholder="Focal entity" />
        </div>
        <div>
          <label class="label" for="ent_incorpDate">Date of incorporation</label>
          <input id="ent_incorpDate" type="date" placeholder="Date of incorporation" />
        </div>
        <div>
          <label class="label" for="ent_city">City</label>
          <input id="ent_city" type="text" placeholder="City" />
        </div>
        <div>
          <label class="label" for="ent_state">State</label>
          <input id="ent_state" type="text" placeholder="State" />
        </div>
        <div>
          <label class="label" for="ent_relationshipStart">Relationship start date</label>
          <input id="ent_relationshipStart" type="date" placeholder="Relationship start date" />
        </div>
        <div>
          <label class="label" for="ent_natureBusiness">Nature of business</label>
          <input id="ent_natureBusiness" type="text" placeholder="Nature of business" />
        </div>
        <div>

          <input id="ent_naics" type="text" placeholder="NAICS code" />
        </div>
        <div>

          <input id="ent_addlInfo" type="text" placeholder="Additional info (details + source)" />
        </div>
        <div>

    <section class="card">

        </div>
      </div>
      <div id="rfi_fields_prior" class="rfi-fields hidden" style="margin-top: 10px">

          </div>
          <div>

            <input id="rfi_submitted_date" type="date" />

          <div>

            <textarea id="rfi_questions_summary" rows="3" placeholder="Summary of questions"></textarea>

          <div>

    <section class="card" id="">

    <div class="flex">

  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script>
    (() => {
      const el = (id) => document.getElementById(id);
      const fileEl = el("file");
      const statusEl = el("status");
      const btnGenerate = el("btnGenerate");
      const btnCopy = el("btnCopy");
      const btnClear = el("btnClear");
      const summaryEditor = el("summaryEditor");
      const focalTypeEl = document.getElementById("focalType");
      const individualFormEl = document.getElementById("focal-individual-form");
      const entityFormEl = document.getElementById("focal-entity-form");
      let rows = [];

      // function for all the the transaction data points
      function TransactionDataPoints() {
        const totalAmount = calculateDebitCreditTotalsAndCounts(rows);
        const totalAmountp2p = calculateTotalsAndCountsByType(
          rows,
          "Transaction Type",
          "p2p",
        );
        const percentage = calculateP2PPercentOfTotals({
          totalDebit: totalAmount.debitTotal,
          p2pDebit: totalAmountp2p.debitTotal,
          totalCredit: totalAmount.creditTotal,
          p2pCredit: totalAmountp2p.creditTotal,
        });
        console.log(percentage, "red");
      }

      function calculateDebitCreditTotalsAndCounts(
        rows,
        {
          amountHeader = "AMOUNT",
          directionHeader = "CREDIT / DEBIT",
          // optional filter (e.g., headerName="TRANSACTION TYPE", type="Sales")
          filterHeader,
          filterValue,
          requireValidAmount = true,
        } = {},
      ) {
        if (!Array.isArray(rows)) throw new TypeError("rows must be an array");

        const normalize = (v) =>
          String(v ?? "")
            .trim()
            .toLowerCase();

        const findKey = (rows, targetHeader) => {
          const target = normalize(targetHeader);
          const keys = rows.flatMap((r) =>
            r && typeof r === "object" ? Object.keys(r) : [],
          );
          return keys.find((k) => normalize(k) === target) || targetHeader;
        };

        const amountKey = findKey(rows, amountHeader);
        const dirKey = findKey(rows, directionHeader);
        const filterKey = filterHeader ? findKey(rows, filterHeader) : null;

        const toNumber = (v) => {
          if (typeof v === "number") return v;
          if (typeof v !== "string") return NaN;
          const cleaned = v.replace(/[$,]/g, "").trim();
          return cleaned ? Number(cleaned) : NaN;
        };

        const toDir = (v) => {
          const d = normalize(v);
          if (d === "debit" || d === "dr") return "debit";
          if (d === "credit" || d === "cr") return "credit";
          return null;
        };

        let debitTotal = 0,
          creditTotal = 0,
          debitCount = 0,
          creditCount = 0;

        for (const row of rows) {
          if (filterKey && normalize(row?.[filterKey]) !== normalize(filterValue))
            continue;

          const dir = toDir(row?.[dirKey]);
          if (!dir) continue;

          const amt = toNumber(row?.[amountKey]);
          if (requireValidAmount && !Number.isFinite(amt)) continue;

          if (dir === "debit") {
            debitCount += 1;
            if (Number.isFinite(amt)) debitTotal += amt;
          } else {
            creditCount += 1;
            if (Number.isFinite(amt)) creditTotal += amt;
          }
        }

        return {
          debitTotal,
          creditTotal,
          // totalAmount: debitTotal + creditTotal,
          debitCount,
          creditCount,
          // totalCount: debitCount + creditCount,
        };
      }

      function calculateTotalsAndCountsByType(
        rows,
        headerName,
        type,
        { requireValidAmountForCount = false } = {},
      ) {
        if (!Array.isArray(rows)) throw new TypeError("rows must be an array");
        if (!headerName || !type) {
          return {
            debitTotal: 0,
            creditTotal: 0,
            total: 0,
            debitCount: 0,
            creditCount: 0,
            totalCount: 0,
          };
        }

        const normalize = (v) =>
          String(v ?? "")
            .trim()
            .toLowerCase();

        const findKey = (rows, targetHeader) => {
          const target = normalize(targetHeader);
          const keys = rows.flatMap((r) =>
            r && typeof r === "object" ? Object.keys(r) : [],
          );
          return keys.find((k) => normalize(k) === target) || targetHeader;
        };

        const typeKey = findKey(rows, headerName);
        const amountKey = findKey(rows, "AMOUNT");
        const creditDebitKey = findKey(rows, "CREDIT / DEBIT");

        const toNumber = (v) => {
          if (typeof v === "number") return v;
          if (typeof v !== "string") return NaN;
          const cleaned = v.replace(/[$,]/g, "").trim();
          return cleaned ? Number(cleaned) : NaN;
        };

        let debitTotal = 0,
          creditTotal = 0,
          debitCount = 0,
          creditCount = 0;

        for (const row of rows) {
          if (normalize(row?.[typeKey]) !== normalize(type)) continue;

          const direction = normalize(row?.[creditDebitKey]);
          const amount = toNumber(row?.[amountKey]);
          const hasValidAmount = Number.isFinite(amount);

          // counts
          if (!requireValidAmountForCount || hasValidAmount) {
            if (direction === "debit") debitCount += 1;
            else if (direction === "credit") creditCount += 1;
          }

          // totals (only when amount is valid)
          if (!hasValidAmount) continue;
          if (direction === "debit") debitTotal += amount;
          else if (direction === "credit") creditTotal += amount;
        }

        return {
          debitTotal,
          creditTotal,
          // total: debitTotal + creditTotal,
          debitCount,
          creditCount,
          // totalCount: debitCount + creditCount,
        };
      }

      function calculateP2PPercentOfTotals({
        totalDebit = 0,
        totalCredit = 0,
        p2pDebit = 0,
        p2pCredit = 0,
        decimals = 2,
      } = {}) {
        const toNum = (v) => (Number.isFinite(v) ? v : Number(v));
        const safe = (n) => (Number.isFinite(n) ? n : 0);

        totalDebit = safe(toNum(totalDebit));
        totalCredit = safe(toNum(totalCredit));
        p2pDebit = safe(toNum(p2pDebit));
        p2pCredit = safe(toNum(p2pCredit));

        const pct = (part, whole) =>
          whole === 0 ? 0 : Number(((part / whole) * 100).toFixed(decimals));

        return {
          p2pPctOfTotalDebit: pct(p2pDebit, totalDebit), // % of total debit from P2P
          p2pPctOfTotalCredit: pct(p2pCredit, totalCredit), // % of total credit from P2P
        };
      }
      const formatMMDDYYYY = (d) => {
        if (!(d instanceof Date) || Number.isNaN(d.getTime())) return null;
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        const yyyy = d.getFullYear();
        return `${mm}/${dd}/${yyyy}`;
      };

      function calculatedateRange(rows, dateHeaderName) {
        if (!Array.isArray(rows)) throw new TypeError("rows must be an array");
        if (!dateHeaderName) return { start: null, end: null, key: null };

        const target = String(dateHeaderName).trim().toLowerCase();

        const keys = rows.flatMap((r) =>
          r && typeof r === "object" ? Object.keys(r) : [],
        );

        const key =
          keys.find((k) => String(k).trim().toLowerCase() === target) ||
          dateHeaderName;

        const toDate = (v) => {
          if (v instanceof Date) return Number.isNaN(v.getTime()) ? null : v;
          if (typeof v === "number") {
            const d = new Date(v);
            return Number.isNaN(d.getTime()) ? null : d;
          }
          if (typeof v !== "string") return null;

          const s = v.trim();
          if (!s) return null;

          // Strict MM/DD/YYYY only
          const m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
          if (!m) return null;

          const mm = Number(m[1]);
          const dd = Number(m[2]);
          const yyyy = Number(m[3]);
          if (mm < 1 || mm > 12 || dd < 1 || dd > 31) return null;

          const d = new Date(yyyy, mm - 1, dd);

          // Reject rollover dates (e.g., 02/31 -> Mar 2)
          if (
            d.getFullYear() !== yyyy ||
            d.getMonth() !== mm - 1 ||
            d.getDate() !== dd
          )
            return null;

          return d;
        };

        let start = null;
        let end = null;

        for (const r of rows) {
          const d = toDate(r?.[key]);
          if (!d) continue;
          if (!start || d < start) start = d;
          if (!end || d > end) end = d;
        }

        return { start: formatMMDDYYYY(start), end: formatMMDDYYYY(end), key };
      }

      function fmtMoney(n) {
        if (!Number.isFinite(n)) return "N/A";
        const sign = n < 0 ? "-" : "";
        const abs = Math.abs(n);
        return `${sign}${abs.toLocaleString(undefined, {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        })}`;
      }
      function normalize(s) {
        return String(s ?? "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g, " ")
          .replace(/[^a-z0-9 ]/g, "");
      }

      function formatWithCommas(value) {
        const n =
          typeof value === "number"
            ? value
            : Number(String(value).replace(/,/g, ""));
        if (!Number.isFinite(n)) return "";
        return n.toLocaleString("en-US", { maximumFractionDigits: 0 });
      }
      function formatPercentWhole(value) {
        // accepts: 1.2455 (treated as 1.2455%), "1.2455%", "0.012455" (if you pass it, it will become 0%)
        const s = String(value ?? "").trim();
        const num = s.endsWith("%") ? Number(s.slice(0, -1)) : Number(s);
        if (!Number.isFinite(num)) return "";
        return `${Math.round(num)}%`;
      }
      function esc(s) {
        return String(s ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
