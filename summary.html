<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Transactions Summarizer</title>
    <style>
      :root {
        --bg: #0f1216;
        --card: #151a21;
        --text: #e9eef6;
        --muted: #aab4c2;
        --line: #263042;
        --primary: #86bc25;
        --blue: #007cb0;
        --danger: #da291c;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        background: linear-gradient(180deg, #0b0e12, var(--bg));
        color: var(--text);
      }
      .app {
        max-width: 980px;
        margin: 28px auto;
        padding: 0 16px;
      }
      .head {
        margin-bottom: 14px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 20px;
      }
      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
        margin: 12px 0;
      }
      .label {
        display: block;
        font-size: 14px;
        color: var(--muted);
        font-weight: 600;

        margin-bottom: 6px;
        margin-left: 10px;
      }
      #summary {
        color: (var(--text));
        font-size: 18px;
        font-weight: 600;
      }
      .hint {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }
      .status.ok {
        color: #cfe8b3;
      }
      .status.bad {
        color: #ffb3ad;
      }

      .row {
        display: flex;
        gap: 12px;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }
      .rowBtns {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      /* Beautiful buttons */
      .btn {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background:
          radial-gradient(
            120% 140% at 20% 0%,
            rgba(255, 255, 255, 0.1),
            transparent 55%
          ),
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.06),
            rgba(255, 255, 255, 0.02)
          );
        color: var(--text);
        padding: 10px 14px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 750;
        font-size: 13px;
        letter-spacing: 0.2px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
        transition:
          transform 0.12s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease;
      }
      .btn:hover:not(:disabled) {
        border-color: rgba(255, 255, 255, 0.22);
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.34);
        transform: translateY(-1px);
      }
      .btn:active:not(:disabled) {
        transform: translateY(0px);
      }
      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        box-shadow: none;
      }

      .btn.primary {
        border-color: rgba(134, 188, 37, 0.55);
        background:
          radial-gradient(
            120% 140% at 20% 0%,
            rgba(255, 255, 255, 0.12),
            transparent 55%
          ),
          linear-gradient(
            180deg,
            rgba(134, 188, 37, 0.26),
            rgba(134, 188, 37, 0.12)
          );
      }
      .btn.primary:hover:not(:disabled) {
        border-color: rgba(134, 188, 37, 0.85);
        box-shadow:
          0 14px 34px rgba(0, 0, 0, 0.34),
          0 0 0 6px rgba(134, 188, 37, 0.14);
      }

      /* Nice file button */
      input[type="file"]::file-selector-button {
        appearance: none;
        border: 1px solid rgba(0, 124, 176, 0.65);
        background:
          radial-gradient(
            120% 140% at 20% 0%,
            rgba(255, 255, 255, 0.12),
            transparent 55%
          ),
          linear-gradient(
            180deg,
            rgba(0, 124, 176, 0.28),
            rgba(0, 124, 176, 0.12)
          );
        color: var(--text);
        padding: 10px 14px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 750;
        margin: 10px;
        transition:
          transform 0.12s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease;
      }
      input[type="file"]::file-selector-button:hover {
        border-color: rgba(0, 124, 176, 0.95);
        box-shadow:
          0 12px 28px rgba(0, 0, 0, 0.3),
          0 0 0 6px rgba(0, 124, 176, 0.14);
        transform: translateY(-1px);
      }

      /* Rich text editor */
      .rte {
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        background: #0f141b;
        margin-top: 10px;
      }
      .rteToolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid var(--line);
        background: #10151c;
      }
      .iconBtn {
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: #0f141b;
        color: var(--text);
        padding: 8px 10px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 800;
        font-size: 13px;
      }
      .iconBtn:hover {
        border-color: rgba(255, 255, 255, 0.22);
      }
      .iconBtn:active {
        transform: translateY(1px);
      }
      .iconBtn.danger {
        border-color: rgba(218, 41, 28, 0.55);
        background: rgba(218, 41, 28, 0.1);
      }

      .sep {
        width: 1px;
        height: 26px;
        background: var(--line);
        margin: 0 2px;
      }

      .rteEditor {
        min-height: 200px;
        padding: 12px;
        outline: none;
        color: var(--text);
      }
      .rteEditor.placeholder:empty:before {
        content: attr(data-placeholder);
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="head">
        <h1>Summary Generator</h1>
      </header>

      <section class="card">
        <label class="label">Upload Excel (.xlsx)</label>
        <input id="file" type="file" accept=".xlsx" />
        <div id="status" class="status" aria-live="polite"></div>
      </section>

      <section class="card">
        <div class="row">
          <div>
            <label class="label">Analyst Comments</label>
          </div>
        </div>

        <div class="rte">
          <div class="rteToolbar" role="toolbar" aria-label="Analysis toolbar">
            <button
              class="iconBtn"
              type="button"
              data-target="analysisEditor"
              data-cmd="bold"
            >
              <b>B</b>
            </button>
            <button
              class="iconBtn"
              type="button"
              data-target="analysisEditor"
              data-cmd="italic"
            >
              <i>I</i>
            </button>
            <button
              class="iconBtn"
              type="button"
              data-target="analysisEditor"
              data-cmd="underline"
            >
              <u>U</u>
            </button>
            <span class="sep"></span>
            <button
              class="iconBtn"
              type="button"
              data-target="analysisEditor"
              data-cmd="insertUnorderedList"
            >
              • List
            </button>
            <button
              class="iconBtn"
              type="button"
              data-target="analysisEditor"
              data-cmd="insertOrderedList"
            >
              1. List
            </button>
            <span class="sep"></span>
            <button
              class="iconBtn"
              type="button"
              data-target="analysisEditor"
              data-cmd="undo"
            >
              Undo
            </button>
            <button
              class="iconBtn"
              type="button"
              data-target="analysisEditor"
              data-cmd="redo"
            >
              Redo
            </button>
            <span class="sep"></span>
            <button
              class="iconBtn danger"
              type="button"
              data-target="analysisEditor"
              data-action="clearFormat"
            >
              Clear format
            </button>
          </div>

          <div
            id="analysisEditor"
            class="rteEditor placeholder"
            contenteditable="true"
            spellcheck="true"
            data-placeholder="Write your analysis points here..."
          ></div>
        </div>
      </section>

      <section class="card">
        <div class="row">
          <div>
            <label class="label" id="summary">Summary </label>
          </div>
          <div class="rowBtns">
            <button id="btnGenerate" class="btn primary" disabled>
              Generate
            </button>
            <button id="btnCopy" class="btn" disabled>Copy</button>
            <button id="btnClear" class="btn" disabled>Clear</button>
          </div>
        </div>

        <div class="rte">
          <div class="rteToolbar" role="toolbar" aria-label="Summary toolbar">
            <button
              class="iconBtn"
              type="button"
              data-target="summaryEditor"
              data-cmd="bold"
            >
              <b>B</b>
            </button>
            <button
              class="iconBtn"
              type="button"
              data-target="summaryEditor"
              data-cmd="italic"
            >
              <i>I</i>
            </button>
            <button
              class="iconBtn"
              type="button"
              data-target="summaryEditor"
              data-cmd="underline"
            >
              <u>U</u>
            </button>
            <span class="sep"></span>
            <button
              class="iconBtn"
              type="button"
              data-target="summaryEditor"
              data-cmd="insertUnorderedList"
            >
              • List
            </button>
            <button
              class="iconBtn"
              type="button"
              data-target="summaryEditor"
              data-cmd="insertOrderedList"
            >
              1. List
            </button>
            <span class="sep"></span>
            <button
              class="iconBtn danger"
              type="button"
              data-target="summaryEditor"
              data-action="clearFormat"
            >
              Clear format
            </button>
          </div>

          <div
            id="summaryEditor"
            class="rteEditor placeholder"
            contenteditable="true"
            spellcheck="true"
            data-placeholder="Summary will appear here..."
          ></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script>
      // Code Generated by Sidekick is for learning and experimentation purposes only.
      (() => {
        const el = (id) => document.getElementById(id);

        const fileEl = el("file");
        const statusEl = el("status");

        const btnGenerate = el("btnGenerate");
        const btnCopy = el("btnCopy");
        const btnClear = el("btnClear");

        const analysisEditor = el("analysisEditor");
        const summaryEditor = el("summaryEditor");

        let rows = [];
        let fileName = "";

        function setStatus(msg, kind = "") {
          statusEl.textContent = msg || "";
          statusEl.className = "status" + (kind ? ` ${kind}` : "");
        }

        function normalize(s) {
          return String(s ?? "")
            .trim()
            .toLowerCase()
            .replace(/\s+/g, " ")
            .replace(/[^a-z0-9 ]/g, "");
        }

        function findCol(headers, candidates) {
          const normToOrig = new Map(headers.map((h) => [normalize(h), h]));
          for (const c of candidates) {
            const hit = normToOrig.get(normalize(c));
            if (hit) return hit;
          }
          const normHeaders = headers.map((h) => ({ h, n: normalize(h) }));
          for (const c of candidates) {
            const cn = normalize(c);
            const hit = normHeaders.find(
              (x) => x.n.includes(cn) || cn.includes(x.n),
            );
            if (hit) return hit.h;
          }
          return "";
        }

        function parseAmount(v) {
          if (v == null || v === "") return NaN;
          if (typeof v === "number") return v;

          const cleaned = String(v)
            .trim()
            .replace(/[^0-9.,\-()]/g, "");
          const neg = /^\(.*\)$/.test(cleaned);
          const unwrapped = cleaned.replace(/[()]/g, "");

          const parts = unwrapped.split(".");
          let numStr = unwrapped;
          if (parts.length > 2) {
            const last = parts.pop();
            numStr = parts.join("") + "." + last;
          }
          numStr = numStr.replace(/,/g, "");
          const n = Number(numStr);
          if (!Number.isFinite(n)) return NaN;
          return neg ? -n : n;
        }

        function parseDate(v) {
          if (v == null || v === "") return null;
          if (v instanceof Date && !isNaN(v)) return v;
          if (typeof v === "number") {
            const epoch = new Date(Date.UTC(1899, 11, 30));
            const d = new Date(epoch.getTime() + v * 86400000);
            return isNaN(d) ? null : d;
          }
          const d = new Date(String(v));
          return isNaN(d) ? null : d;
        }

        function fmtMoney(n) {
          if (!Number.isFinite(n)) return "N/A";
          const sign = n < 0 ? "-" : "";
          const abs = Math.abs(n);
          return `${sign}${abs.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        }

        function fmtDate(d) {
          return d instanceof Date && !isNaN(d)
            ? d.toISOString().slice(0, 10)
            : "N/A";
        }

        function esc(s) {
          return String(s ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        function sanitizeBasicHtml(html) {
          // allow basic formatting + lists; remove everything else
          const allowed = new Set([
            "B",
            "STRONG",
            "I",
            "EM",
            "U",
            "BR",
            "DIV",
            "P",
            "UL",
            "OL",
            "LI",
            "SPAN",
          ]);
          const tpl = document.createElement("template");
          tpl.innerHTML = String(html || "");

          const walk = (node) => {
            const children = Array.from(node.childNodes);
            for (const ch of children) {
              if (ch.nodeType === Node.ELEMENT_NODE) {
                const tag = ch.tagName.toUpperCase();
                if (!allowed.has(tag)) {
                  // unwrap: keep text/children
                  const frag = document.createDocumentFragment();
                  while (ch.firstChild) frag.appendChild(ch.firstChild);
                  ch.replaceWith(frag);
                } else {
                  // strip attributes (keeps it simple/safe)
                  for (const attr of Array.from(ch.attributes))
                    ch.removeAttribute(attr.name);
                  walk(ch);
                }
              } else if (ch.nodeType === Node.COMMENT_NODE) {
                ch.remove();
              }
            }
          };

          walk(tpl.content);
          return tpl.innerHTML;
        }

        function buildSummaryHtml() {
          if (!rows.length) throw new Error("No transactions loaded.");

          const headers = Object.keys(rows[0] || {});
          const dateCol = findCol(headers, [
            "date",
            "posting date",
            "transaction date",
            "txn date",
          ]);
          const amtCol = findCol(headers, [
            "amount",
            "amt",
            "value",
            "transaction amount",
            "debit",
            "credit",
          ]);
          const descCol = findCol(headers, [
            "description",
            "narration",
            "details",
            "merchant",
            "payee",
            "memo",
          ]);
          const catCol = findCol(headers, [
            "category",
            "type",
            "classification",
          ]);

          const parsed = rows.map((r) => ({
            amount: amtCol ? parseAmount(r[amtCol]) : NaN,
            date: dateCol ? parseDate(r[dateCol]) : null,
            desc: descCol ? String(r[descCol] ?? "").trim() : "",
            cat: catCol ? String(r[catCol] ?? "").trim() : "",
          }));

          const amountOk = parsed.filter((x) => Number.isFinite(x.amount));
          const dateOk = parsed.filter(
            (x) => x.date instanceof Date && !isNaN(x.date),
          );

          const total = amountOk.reduce((a, x) => a + x.amount, 0);
          const inflow = amountOk
            .filter((x) => x.amount > 0)
            .reduce((a, x) => a + x.amount, 0);
          const outflow = amountOk
            .filter((x) => x.amount < 0)
            .reduce((a, x) => a + x.amount, 0);

          const minDate = dateOk.length
            ? new Date(Math.min(...dateOk.map((x) => x.date.getTime())))
            : null;
          const maxDate = dateOk.length
            ? new Date(Math.max(...dateOk.map((x) => x.date.getTime())))
            : null;

          const byCat = new Map();
          for (const x of amountOk) {
            const k = x.cat || "(Uncategorized)";
            byCat.set(k, (byCat.get(k) || 0) + x.amount);
          }
          const topCats = [...byCat.entries()]
            .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))
            .slice(0, 5);

          const topTx = amountOk
            .map((x) => ({ ...x, abs: Math.abs(x.amount) }))
            .sort((a, b) => b.abs - a.abs)
            .slice(0, 5);

          const analysisHtml = sanitizeBasicHtml(analysisEditor.innerHTML);
          const hasAnalysis = analysisEditor.textContent.trim().length > 0;

          const warnings = [];
          if (!amtCol) warnings.push("amount");
          if (!dateCol) warnings.push("date");

          return `
      <div>
        <p><b>File:</b> ${esc(fileName || "Uploaded Excel")}</p>
        <p><b>Transactions:</b> ${esc(rows.length)}</p>

        <h3>Summary</h3>
        <ul>
          <li><b>Date range:</b> ${esc(minDate ? fmtDate(minDate) : "N/A")} to ${esc(maxDate ? fmtDate(maxDate) : "N/A")}</li>
          <li><b>Net total:</b> ${esc(fmtMoney(total))}</li>
          <li><b>Inflows:</b> ${esc(fmtMoney(inflow))}</li>
          <li><b>Outflows:</b> ${esc(fmtMoney(outflow))}</li>
        </ul>

        <h3>Top categories (absolute net)</h3>
        ${
          topCats.length
            ? `
          <ol>
            ${topCats.map(([k, v]) => `<li>${esc(k)}: <b>${esc(fmtMoney(v))}</b></li>`).join("")}
          </ol>`
            : `<p><i>N/A</i></p>`
        }

        <h3>Largest transactions (absolute amount)</h3>
        ${
          topTx.length
            ? `
          <ol>
            ${topTx
              .map((t) => {
                const label = [
                  t.desc || t.cat || "Transaction",
                  t.date ? fmtDate(t.date) : "",
                ]
                  .filter(Boolean)
                  .join(" — ");
                return `<li>${esc(label)}: <b>${esc(fmtMoney(t.amount))}</b></li>`;
              })
              .join("")}
          </ol>`
            : `<p><i>N/A</i></p>`
        }

        <h3>My analysis points</h3>
        ${hasAnalysis ? `<div>${analysisHtml}</div>` : `<p><i>No analysis added.</i></p>`}

        ${warnings.length ? `<p><i>Note: Could not detect ${esc(warnings.join(" and "))} column(s) reliably.</i></p>` : ``}
      </div>
    `.trim();
        }

        async function copySummary() {
          const html = summaryEditor.innerHTML;
          const text = summaryEditor.innerText;

          if (!text.trim()) return;

          try {
            if (navigator.clipboard && window.ClipboardItem) {
              await navigator.clipboard.write([
                new ClipboardItem({
                  "text/html": new Blob([html], { type: "text/html" }),
                  "text/plain": new Blob([text], { type: "text/plain" }),
                }),
              ]);
            } else {
              await navigator.clipboard.writeText(text);
            }
            setStatus("Copied.", "ok");
          } catch {
            setStatus("Copy blocked—select and copy manually.", "bad");
          }
        }

        function clearAll() {
          rows = [];
          fileName = "";
          fileEl.value = "";

          analysisEditor.innerHTML = "";
          summaryEditor.innerHTML = "";

          btnGenerate.disabled = true;
          btnCopy.disabled = true;
          btnClear.disabled = true;

          setStatus("", "");
        }

        // Toolbar commands
        document.addEventListener("click", (e) => {
          const btn = e.target.closest("[data-cmd], [data-action]");
          if (!btn) return;

          const targetId = btn.getAttribute("data-target");
          const target = targetId ? document.getElementById(targetId) : null;
          if (!target) return;

          target.focus();

          const cmd = btn.getAttribute("data-cmd");
          const action = btn.getAttribute("data-action");

          if (cmd) document.execCommand(cmd, false, null);
          if (action === "clearFormat") {
            document.execCommand("removeFormat", false, null);
            document.execCommand("unlink", false, null);
          }
        });

        // Enable copy based on summary content
        summaryEditor.addEventListener("input", () => {
          btnCopy.disabled = !summaryEditor.textContent.trim();
        });

        fileEl.addEventListener("change", async () => {
          setStatus("", "");
          const f = fileEl.files?.[0];
          if (!f) return;

          try {
            if (!window.XLSX)
              throw new Error("Missing XLSX library (xlsx.full.min.js).");

            fileName = f.name;
            const buf = await f.arrayBuffer();
            const wb = XLSX.read(buf, { type: "array", cellDates: true });

            const sheetName = wb.SheetNames?.[0];
            if (!sheetName) throw new Error("No sheets found.");

            const ws = wb.Sheets[sheetName];
            const json = XLSX.utils.sheet_to_json(ws, { defval: "" });
            if (!json.length) throw new Error("No transaction rows found.");

            rows = json;

            btnGenerate.disabled = false;
            btnClear.disabled = false;

            setStatus(`Loaded: ${f.name}`, "ok");
          } catch (err) {
            clearAll();
            setStatus(err?.message || "Failed to load file.", "bad");
          }
        });

        btnGenerate.addEventListener("click", () => {
          try {
            const html = buildSummaryHtml();
            summaryEditor.innerHTML = html;
            btnCopy.disabled = !summaryEditor.textContent.trim();
            setStatus("Generated. Edit the summary as needed.", "ok");
          } catch (err) {
            setStatus(err?.message || "Failed to generate summary.", "bad");
          }
        });

        btnCopy.addEventListener("click", copySummary);
        btnClear.addEventListener("click", clearAll);

        clearAll();
      })();
    </script>
  </body>
</html>
